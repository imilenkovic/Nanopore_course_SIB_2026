# Parameters

# Needed for pod5 input
pod5: "../../data/mouse/CTR/*.pod5"

## Can be OFF / cuda10 / cuda11.
GPU: "cuda11"
# Basecalling can be either NO, dorado, dorado-mod or dorado-duplex
basecalling: "dorado-mod"
## Demultiplexing can be either dorado (for DNA) / seqtagger (for RNA)
#For emitting the move tables (with dorado-mod)
emit_moves: ""
## Demultiplexing can be either dorado (for DNA) / seqtagger (for RNA)
demultiplexing: "NO"
demulti_pod5: "OFF"
### Number of fast5 basecalled per parallel job
granularity: 1
### File with the list of accepted barcodes. It can be empty
barcodes: ""

# Needed for fastq input
fastq: ""

# Common
reference: "../../references/chr19.fa"
## Can be transcriptome / genome
ref_type: "genome"
annotation: "../../references/chr19_annotation.gtf"

# Actions
## Can be nanoq / nanofilt
filtering: "nanoq"
## Can be graphmap / graphmap2 / minimap2 / winnowmap / bwa / NO
mapping: "minimap2"
## Can be nanocount for transcriptome / htseq for genome
counting: "htseq"
## Can be NO / bambu / isoquant
discovery: "NO"
## Convert bam to cram
cram_conv: "YES"
subsampling_cram: 50

# Output and messaging
slackhook: ""
email: ""
output: "../../output_mop/mRNA_test2"

# Program params
progPars:
  basecalling:
    dorado: "fast"
    dorado-duplex: "hac"
    dorado-mod: "hac,m6A_DRACH"
  demultiplexing:
    seqtagger: "-k b96_RNA004"
    dorado: ""
  filtering:
    seqkit: ""
    nanoq: ""
  mapping:
    graphmap: ""
    graphmap2: "-x rnaseq"
    minimap2: "-y -uf -k14"
    bwa: ""
    winnowmap: ""
  counting:
    htseq: "-a 0"
    nanocount: ""
  discovery:
    bambu: ""
